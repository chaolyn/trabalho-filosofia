<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#F7FBFF"/>
<stop offset="100%" stop-color="#EAF4FF"/>
</linearGradient>

<linearGradient id="dnaBlue" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#4DA3FF"/>
<stop offset="100%" stop-color="#1565C0"/>
</linearGradient>

<linearGradient id="dnaRed" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#FF7B7B"/>
<stop offset="100%" stop-color="#D32F2F"/>
</linearGradient>

<filter id="shadow">
<feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".18"/>
</filter>

</defs>

<rect width="800" height="600" fill="url(#bg)"/>

<!-- círculos decorativos -->

<circle cx="120" cy="120" r="70" fill="#D8ECFF"/>

<circle cx="680" cy="480" r="85" fill="#DDEEFF"/>

<!-- DNA -->

<g filter="url(#shadow)">

<path
d="
M270 70
C360 120 360 190 270 240
C180 290 180 360 270 410
C360 460 360 530 270 580"
fill="none"
stroke="url(#dnaBlue)"
stroke-width="10"
stroke-linecap="round"/>

<path
d="
M530 70
C440 120 440 190 530 240
C620 290 620 360 530 410
C440 460 440 530 530 580"
fill="none"
stroke="url(#dnaRed)"
stroke-width="10"
stroke-linecap="round"/>

</g>

<!-- pares -->

<g stroke="#64748B" stroke-width="4">

<line x1="300" y1="95" x2="500" y2="95"/>

<line x1="255" y1="145" x2="545" y2="145"/>

<line x1="220" y1="195" x2="580" y2="195"/>

<line x1="205" y1="245" x2="595" y2="245"/>

<line x1="205" y1="295" x2="595" y2="295"/>

<line x1="220" y1="345" x2="580" y2="345"/>

<line x1="255" y1="395" x2="545" y2="395"/>

<line x1="300" y1="445" x2="500" y2="445"/>

<line x1="340" y1="495" x2="460" y2="495"/>

</g>

<!-- Cas9 -->

<g filter="url(#shadow)">

<ellipse
cx="515"
cy="285"
rx="95"
ry="72"
fill="#2979FF"/>

<ellipse
cx="515"
cy="285"
rx="70"
ry="48"
fill="#5AA9FF"/>

<text
x="515"
y="295"
font-family="Arial"
font-size="28"
text-anchor="middle"
fill="white"
font-weight="bold">

Cas9

</text>

</g>

<!-- RNA guia -->

<path
d="
M610 270
Q650 270 675 250
Q700 235 715 220"
fill="none"
stroke="#2ECC71"
stroke-width="8"
stroke-linecap="round"/>

<circle cx="715" cy="220" r="10" fill="#2ECC71"/>

<!-- local do corte -->

<line
x1="394"
y1="250"
x2="430"
y2="320"
stroke="#E53935"
stroke-width="7"
stroke-dasharray="10 8"/>

<line
x1="430"
y1="250"
x2="394"
y2="320"
stroke="#E53935"
stroke-width="7"
stroke-dasharray="10 8"/>

<!-- alvo -->

<circle
cx="410"
cy="285"
r="55"
fill="none"
stroke="#22C55E"
stroke-width="4"
stroke-dasharray="8 6"/>

<!-- legenda -->

<g>

<rect
x="55"
y="430"
width="240"
height="120"
rx="18"
fill="white"
