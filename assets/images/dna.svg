<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">

    <defs>

        <linearGradient id="dnaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#06B6D4"/>
            <stop offset="50%" stop-color="#4F46E5"/>
            <stop offset="100%" stop-color="#312E81"/>
        </linearGradient>

        <filter id="glow">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

    </defs>

    <rect width="800" height="800" fill="transparent"/>

    <!-- Molécula -->

    <path
        d="M270 80
           C430 170 430 300 270 400
           C110 500 110 630 270 720"
        fill="none"
        stroke="url(#dnaGradient)"
        stroke-width="10"
        stroke-linecap="round"
        filter="url(#glow)"
    />

    <path
        d="M530 80
           C370 170 370 300 530 400
           C690 500 690 630 530 720"
        fill="none"
        stroke="url(#dnaGradient)"
        stroke-width="10"
        stroke-linecap="round"
        filter="url(#glow)"
    />

    <!-- Ligações -->

    <g stroke="#A5B4FC" stroke-width="5">

        <line x1="300" y1="120" x2="500" y2="120"/>
        <line x1="260" y1="180" x2="540" y2="180"/>
        <line x1="240" y1="240" x2="560" y2="240"/>
        <line x1="255" y1="300" x2="545" y2="300"/>
        <line x1="300" y1="360" x2="500" y2="360"/>

        <line x1="500" y1="440" x2="300" y2="440"/>
        <line x1="545" y1="500" x2="255" y2="500"/>
        <line x1="560" y1="560" x2="240" y2="560"/>
        <line x1="540" y1="620" x2="260" y2="620"/>
        <line x1="500" y1="680" x2="300" y2="680"/>

    </g>

    <!-- Pontos -->

    <g fill="#FFFFFF">

        <circle cx="300" cy="120" r="8"/>
        <circle cx="500" cy="120" r="8"/>

        <circle cx="260" cy="180" r="8"/>
        <circle cx="540" cy="180" r="8"/>

        <circle cx="240" cy="240" r="8"/>
        <circle cx="560" cy="240" r="8"/>

        <circle cx="255" cy="300" r="8"/>
        <circle cx="545" cy="300" r="8"/>

        <circle cx="300" cy="360" r="8"/>
        <circle cx="500" cy="360" r="8"/>

        <circle cx="500" cy="440" r="8"/>
        <circle cx="300" cy="440" r="8"/>

        <circle cx="545" cy="500" r="8"/>
        <circle cx="255" cy="500" r="8"/>

        <circle cx="560" cy="560" r="8"/>
        <circle cx="240" cy="560" r="8"/>

        <circle cx="540" cy="620" r="8"/>
        <circle cx="260" cy="620" r="8"/>

        <circle cx="500" cy="680" r="8"/>
        <circle cx="300" cy="680" r="8"/>

    </g>

</svg>