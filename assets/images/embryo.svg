<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 800">

    <defs>

        <radialGradient id="cellGradient" cx="50%" cy="45%">
            <stop offset="0%" stop-color="#FFE7C2"/>
            <stop offset="100%" stop-color="#F4B183"/>
        </radialGradient>

        <radialGradient id="nucleusGradient" cx="40%" cy="40%">
            <stop offset="0%" stop-color="#9D7CF3"/>
            <stop offset="100%" stop-color="#5E4DB3"/>
        </radialGradient>

        <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0"
                          dy="12"
                          stdDeviation="18"
                          flood-color="#000"
                          flood-opacity="0.15"/>
        </filter>

    </defs>

    <!-- Fundo -->

    <circle
        cx="400"
        cy="400"
        r="330"
        fill="#EEF7FF"/>

    <!-- Halo -->

    <circle
        cx="400"
        cy="400"
        r="255"
        fill="none"
        stroke="#D5EAF9"
        stroke-width="12"/>

    <!-- Célula -->

    <circle
        cx="400"
        cy="400"
        r="185"
        fill="url(#cellGradient)"
        filter="url(#shadow)"/>

    <!-- Membrana -->

    <circle
        cx="400"
        cy="400"
        r="185"
        fill="none"
        stroke="#E19A63"
        stroke-width="8"/>

    <!-- Núcleo -->

    <circle
        cx="400"
        cy="400"
        r="78"
        fill="url(#nucleusGradient)"/>

    <!-- Cromatina -->

    <path
        d="
        M360 390
        C375 365 425 365 440 392
        C450 410 430 435 400 440
        C370 438 352 415 360 390
        "
        fill="none"
        stroke="#FFFFFF"
        stroke-width="7"
        stroke-linecap="round"/>

    <path
        d="
        M388 355
        C418 375 420 425 390 445
        "
        fill="none"
        stroke="#E5DAFF"
        stroke-width="5"
        stroke-linecap="round"/>

    <!-- Blastômeros -->

    <circle cx="335" cy="330" r="16" fill="#FFF4E8"/>
    <circle cx="470" cy="330" r="13" fill="#FFF4E8"/>
    <circle cx="320" cy="445" r="12" fill="#FFF4E8"/>
    <circle cx="470" cy="465" r="15" fill="#FFF4E8"/>
    <circle cx="355" cy="500" r="10" fill="#FFF4E8"/>
    <circle cx="445" cy="285" r="10" fill="#FFF4E8"/>

    <!-- Brilhos -->

    <circle
        cx="350"
        cy="340"
        r="18"
        fill="#FFFFFF"
        opacity=".30"/>

    <circle
        cx="320"
        cy="305"
        r="8"
        fill="#FFFFFF"
        opacity=".45"/>

</svg>