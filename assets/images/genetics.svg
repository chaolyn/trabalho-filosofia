<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">

<defs>

<linearGradient id="bg" x1="0" x2="1">
<stop offset="0%" stop-color="#EEF6FF"/>
<stop offset="100%" stop-color="#FFFFFF"/>
</linearGradient>

<linearGradient id="dnaBlue" x1="0" x2="1">
<stop offset="0%" stop-color="#1E88E5"/>
<stop offset="100%" stop-color="#42A5F5"/>
</linearGradient>

<linearGradient id="dnaRed" x1="0" x2="1">
<stop offset="0%" stop-color="#EF5350"/>
<stop offset="100%" stop-color="#FF8A80"/>
</linearGradient>

<filter id="shadow">
<feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity=".18"/>
</filter>

</defs>

<rect width="900" height="700" fill="url(#bg)"/>

<circle cx="760" cy="120" r="70" fill="#E3F2FD"/>
<circle cx="140" cy="590" r="110" fill="#F3F8FF"/>

<!-- Livro -->

<g filter="url(#shadow)">

<rect
x="120"
y="120"
width="260"
height="420"
rx="24"
fill="white"/>

<line x1="250" y1="120" x2="250" y2="540"
stroke="#E5EAF2"
stroke-width="3"/>

<line x1="150" y1="180" x2="220" y2="180"
stroke="#D7DEE8"
stroke-width="5"/>

<line x1="150" y1="210" x2="220" y2="210"
stroke="#D7DEE8"
stroke-width="5"/>

<line x1="280" y1="180" x2="350" y2="180"
stroke="#D7DEE8"
stroke-width="5"/>

<line x1="280" y1="210" x2="350" y2="210"
stroke="#D7DEE8"
stroke-width="5"/>

</g>

<!-- DNA -->

<g transform="translate(520 340) scale(1.1)">

<path
d="
M-40 -180
C40 -120
40 -60
-40 0
C-120 60
-120 120
-40 180"
fill="none"
stroke="url(#dnaBlue)"
stroke-width="10"
stroke-linecap="round"/>

<path
d="
M40 -180
C-40 -120
-40 -60
40 0
C120 60
120 120
40 180"
fill="none"
stroke="url(#dnaRed)"
stroke-width="10"
stroke-linecap="round"/>

<g stroke="#8FA4B5" stroke-width="4">

<line x1="-22" y1="-150" x2="22" y2="-150"/>
<line x1="-35" y1="-105" x2="35" y2="-105"/>
<line x1="-28" y1="-60" x2="28" y2="-60"/>
<line x1="-12" y1="-15" x2="12" y2="-15"/>
<line x1="-12" y1="30" x2="12" y2="30"/>
<line x1="-28" y1="75" x2="28" y2="75"/>
<line x1="-35" y1="120" x2="35" y2="120"/>
<line x1="-22" y1="165" x2="22" y2="165"/>

</g>

</g>

<!-- Gene -->

<g filter="url(#shadow)">

<circle
cx="690"
cy="530"
r="65"
fill="white"/>

<path
d="M660 520
Q690 470 720 520
Q690 570 660 520Z"
fill="#4CAF50"/>

<circle cx="690" cy="520" r="10" fill="#81C784"/>

</g>

<!-- moléculas -->

<g fill="#90CAF9">

<circle cx="610" cy="110" r="8"/>
<circle cx="630" cy="90" r="5"/>
<circle cx="645" cy="125" r="6"/>

</g>

<g fill="#EF9A9A">

<circle cx="520" cy="620" r="7"/>
<circle cx="540" cy="600" r="5"/>
<circle cx="560" cy="625" r="6"/>

</g>

</svg>