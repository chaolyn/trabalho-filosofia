<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#F7FBFF"/>
<stop offset="100%" stop-color="#EDF7FF"/>
</linearGradient>

<linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#FFD54F"/>
<stop offset="100%" stop-color="#FF9800"/>
</linearGradient>

<linearGradient id="blueDNA" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#42A5F5"/>
<stop offset="100%" stop-color="#1565C0"/>
</linearGradient>

<linearGradient id="redDNA" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#EF5350"/>
<stop offset="100%" stop-color="#C62828"/>
</linearGradient>

<filter id="shadow">
<feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".18"/>
</filter>

</defs>

<rect width="800" height="600" fill="url(#bg)"/>

<!-- Sol -->

<circle
cx="400"
cy="185"
r="85"
fill="url(#sun)"
filter="url(#shadow)"/>

<!-- Raios -->

<g stroke="#FFD54F" stroke-width="4" stroke-linecap="round">

<line x1="400" y1="45" x2="400" y2="85"/>
<line x1="400" y1="285" x2="400" y2="325"/>

<line x1="260" y1="185" x2="300" y2="185"/>
<line x1="500" y1="185" x2="540" y2="185"/>

<line x1="315" y1="100" x2="340" y2="125"/>
<line x1="485" y1="100" x2="460" y2="125"/>

<line x1="315" y1="270" x2="340" y2="245"/>
<line x1="485" y1="270" x2="460" y2="245"/>

</g>

<!-- Horizonte -->

<path
d="
M0 430
Q150 390 300 420
Q430 450 520 410
Q650 365 800 430
L800 600
L0 600
Z"
fill="#D7EFFF"/>

<!-- DNA -->

<g filter="url(#shadow)">

<path
d="
M290 560
C390 500 390 390 290 330
C190 270 190 180 290 120"
fill="none"
stroke="url(#blueDNA)"
stroke-width="10"
stroke-linecap="round"/>

<path
d="
M510 560
C410 500 410 390 510 330
C610 270 610 180 510 120"
fill="none"
stroke="url(#redDNA)"
stroke-width="10"
stroke-linecap="round"/>

</g>

<!-- Ligações -->

<g stroke="#64748B" stroke-width="4">

<line x1="330" y1="150" x2="470" y2="150"/>
<line x1="300" y1="210" x2="500" y2="210"/>
<line x1="270" y1="270" x2="530" y2="270"/>
<line x1="250" y1="330" x2="550" y2="330"/>
<line x1="270" y1="390" x2="530" y2="390"/>
<line x1="300" y1="450" x2="500" y2="450"/>
<line x1="330" y1="510" x2="470" y2="510"/>

</g>

<!-- Partículas -->

<g fill="#60A5FA">

<circle cx="120" cy="120" r="5"/>
<circle cx="150" cy="155" r="5"/>
<circle cx="185" cy="125" r="5"/>

<circle cx="640" cy="110" r="5"/>
<circle cx="675" cy="145" r="5"/>
<circle cx="710" cy="120" r="5"/>

<circle cx="660" cy="480" r="6"/>
<circle cx="700" cy="510" r="6"/>
<circle cx="620" cy="520" r="6"/>

</g>

<!-- Átomo -->

<g transform="translate(120 470)">

<circle r="9" fill="#4F46E5"/>

<ellipse
rx="45"
ry="18"
fill="none"
stroke="#4F46E5"
stroke-width="2"/>

<ellipse
rx="18"
ry="45"
fill="none"
stroke="#4F46E5"
stroke-width="2"/>

<ellipse
rx="38"
ry="38"
transform="rotate(45)"
fill="none"
stroke="#4F46E5"
stroke-width="2"/>

</g>

<!-- Texto -->

<text
x="400"
y="65"
text-anchor="middle"
font-family="Arial"
font-size="30"
font-weight="bold"
fill="#334155">

Ciência • Ética • Futuro

</text>

</svg>